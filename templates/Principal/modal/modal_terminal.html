<div class="modal-overlay" id="modalTerminal" onclick="closeOnOverlay(event, 'modalTerminal')">
    <div class="modal modal-lg terminal-window">
        <div class="modal-header">
            <div class="modal-terminal-btns">
                <span class="mtb mtb-red" onclick="closeModal('modalTerminal')"></span>
                <span class="mtb mtb-yellow"></span>
                <span class="mtb mtb-green"></span>
            </div>
            <span class="modal-title">SYSTEM_TERMINAL.sh</span>
        </div>
        <div class="modal-body terminal-body" style="padding: 0; overflow: hidden; height: 400px; background: #000;">
            <div id="terminal-container" style="height: 100%; width: 100%; padding: 10px;"></div>
        </div>
    </div>
</div>
