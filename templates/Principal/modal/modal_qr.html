<!-- ══════════════════════════════════════════ MODAL VISUALIZAR QR WIFI ══════════════════════════════════════════════════ -->

<div class="modal-overlay" id="modalQrWifi" onclick="closeOnOverlay(event, 'modalQrWifi')">
    <div class="modal modal-md">
        <div class="modal-header">
            <div class="modal-terminal-btns">
                <span class="mtb mtb-red" onclick="closeModal('modalQrWifi')"></span>
                <span class="mtb mtb-yellow"></span>
                <span class="mtb mtb-green"></span>
            </div>
            <span class="btn btn-outline btn-sm btn-outline-yellow">VISOR_QR_WIFI.exe</span>
        </div>
        <div class="modal-body" style="text-align: center; padding: 30px;">
            <div class="qr-container" style="background: white; padding: 20px; display: inline-block; border-radius: 8px; box-shadow: 0 0 20px rgba(0,255,135,0.2);">
                <img id="imgQrWifi" src="" alt="Código QR WiFi" style="max-width: 250px; height: auto; display: block;">
            </div>
            <div style="margin-top: 25px;">
                <p id="txtQrSsid" style="font-family: 'JetBrains Mono', monospace; color: #00ff87; font-size: 1.1rem; margin-bottom: 5px;">SSID: ---</p>
                <p id="txtQrPass" style="font-family: 'JetBrains Mono', monospace; color: #ffcc00; font-size: 1rem; margin-bottom: 10px;">CLAVE: ---</p>
                <p style="font-size: 0.8rem; color: #888; letter-spacing: 1px;">[ ESCANEA PARA CONECTAR ]</p>
            </div>
        </div>
        <div class="modal-footer" style="justify-content: center;">
            <button class="btn btn-outline btn-sm btn-outline-yellow" onclick="descargarQR()">
                <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="margin-right: 5px;">
                    <path d="M.5 9.9a.5.5 0 01.5.5v2.5a1 1 0 001 1h12a1 1 0 001-1v-2.5a.5.5 0 011 0v2.5a2 2 0 01-2 2H2a2 2 0 01-2-2v-2.5a.5.5 0 01.5-.5z"/>
                    <path d="M7.646 11.854a.5.5 0 00.708 0l3-3a.5.5 0 00-.708-.708L8.5 10.293V1.5a.5.5 0 00-1 0v8.793L5.354 8.146a.5.5 0 10-.708.708l3 3z"/>
                </svg>
                DESCARGAR PNG
            </button>
            <button class="btn btn-outline btn-sm" onclick="closeModal('modalQrWifi')">[ CERRAR ]</button>
        </div>
    </div>
</div>

<script>
function descargarQR() {
    const img = document.getElementById('imgQrWifi');
    const ssid = document.getElementById('txtQrSsid').textContent.split(': ')[1];
    if (!img.src) return;
    
    const link = document.createElement('a');
    link.href = img.src;
    link.download = `QR_WIFI_${ssid}.png`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}
</script>
