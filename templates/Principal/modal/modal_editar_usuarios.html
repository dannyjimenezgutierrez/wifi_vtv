<!-- ══════════════════════════════════════════ MODAL EDITAR ══════════════════════════════════════════════════ -->

<div class="modal-overlay" id="modalEditarUsuarios" onclick="closeOnOverlay(event, 'modalEditarUsuarios')">
    <div class="modal modal-lg">
        <div class="modal-header">
            <div class="modal-terminal-btns">
                <span class="mtb mtb-red" onclick="closeModal('modalEditarUsuarios')"></span>
                <span class="mtb mtb-yellow"></span>
                <span class="mtb mtb-green"></span>
            </div>
            <span class="btn btn-outline btn-sm btn-outline-blue" id="modalEditTitle">EDITAR USUARIO.exe</span>
        </div>
        <div class="modal-body">
            <!-- Tabs Navigation -->
            <div class="modal-tabs">
                <div class="modal-tab active" onclick="switchTab('etabPersonal', 'modalEditarUsuarios')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" class="tab-icon">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg> INFORMACIÓN PERSONAL
                </div>
                <div class="modal-tab" onclick="switchTab('etabAccount', 'modalEditarUsuarios')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round" class="tab-icon">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg> INFORMACIÓN DE CUENTA
                </div>
            </div>

            <form id="formEdit" novalidate>
                <input type="hidden" id="eEditId">

                <div id="etabPersonal" class="tab-panel active">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">&gt; PRIMER_NOMBRE</label>
                            <input type="text" id="eFirstName" class="form-input" placeholder="Ej. Juan" 
                                minlength="3" maxlength="16" pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">&gt; SEGUNDO_NOMBRE</label>
                            <input type="text" id="eSecondName" class="form-input" placeholder="Ej. Antonio"
                                minlength="3" maxlength="16" pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">&gt; PRIMER_APELLIDO</label>
                            <input type="text" id="eLastName" class="form-input" placeholder="Ej. Pérez" 
                                minlength="3" maxlength="16" pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">&gt; SEGUNDO_APELLIDO</label>
                            <input type="text" id="eSecondLastName" class="form-input" placeholder="Ej. Rodríguez"
                                minlength="3" maxlength="16" pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ\s]+$">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">&gt; CÉDULA_IDENTIDAD</label>
                            <input type="text" id="eCedula" class="form-input" placeholder="00000000" 
                                pattern="^\d{6,8}$" title="Debe ser solo números (6 a 8 dígitos)" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">&gt; TELÉFONO_CONTACTO</label>
                            <input type="text" id="ePhone" class="form-input" placeholder="04140000000"
                                pattern="^04(12|14|16|22|24|26)\d{7}$" title="Formato requerido: 04XXXXXXXXX" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group" style="grid-column: span 2;">
                            <label class="form-label">&gt; CORREO_ELECTRÓNICO</label>
                            <input type="email" id="eEmail" class="form-input" placeholder="usuario@vtv.gob.ve" pattern="^[a-zA-Z0-9._%+-]+@vtv\.gob\.ve$" title="Debe ser un correo institucional (@vtv.gob.ve)" required>
                        </div>
                    </div>
                </div>

                <div id="etabAccount" class="tab-panel">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">[ PERFIL SISTEMA ]</label>
                            <select id="eProfile" class="form-input form-select" required>
                                <option value=""> Seleccione un Perfil</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">[ ESTADO ]</label>
                            <select id="eStatus" class="form-input form-select" required>
                                <option value=""> Seleccione un Estado</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">[ GERENCIAS ]</label>
                            <select id="eGerencia" class="form-input form-select" required>
                                <option value=""> Seleccione una Gerencia</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">[ DIVISIÓNES ]</label>
                            <select id="eDivision" class="form-input form-select" required>
                                <option value=""> Seleccione una División</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">[ NOMBRE DE USUARIO ]</label>
                            <input type="text" id="eUsername" class="form-input" placeholder="Ej. jpererez" 
                                minlength="3" maxlength="16" pattern="^[a-zA-Z]+$" title="Solo letras (3 a 16 caracteres)" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">[ CLAVE DE ACCESO ]</label>
                            <div class="password-wrapper">
                                <input type="password" id="ePassword" class="form-input" placeholder="••••••••"
                                    minlength="8" maxlength="16" pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,16}$" 
                                    title="Debe incluir Mayúscula, minúscula, número y símbolo (@$!%*?&)">
                                <button type="button" class="password-toggle" onclick="togglePassword('ePassword', 'ePassIcon')" id="ePassIcon">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline btn-sm btn-outline-red" onclick="closeModal('modalEditarUsuarios')">[
                CANCELAR
                ]</button>
            <button class="btn btn-outline btn-sm" onclick="updateRecord()">[ EDITAR USUARIOS ]</button>
        </div>
    </div>
</div>
