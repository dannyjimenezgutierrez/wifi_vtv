    <div class="topbar-left">
        <div class="breadcrumb">
            <span class="bc-root">WIFI VTV</span>
            <span class="bc-current">SERVIDORES Y REDES</span>
        </div>
    </div>

    <div class="topbar-right">
        <div class="breadcrumb" style="display: flex; gap: 10px;">
            <span class="bc-root">{{ hora }}</span>
            <span class="bc-current">{{ fecha }}</span>
            <span class="bc-current">IP: {{ ip }}</span>
            <span class="bc-current" id="footerIsp">PROVEEDOR: {{ isp }}</span>
