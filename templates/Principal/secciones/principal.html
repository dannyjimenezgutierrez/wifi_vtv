    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const ctx = document.getElementById('realTimeChart').getContext('2d');
            const ctxDoughnut = document.getElementById('doughnutChart').getContext('2d');

            let gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(0, 255, 255, 0.4)');
            gradient.addColorStop(1, 'rgba(0, 255, 255, 0.0)');

            const chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['-30s', '-25s', '-20s', '-15s', '-10s', '-5s', 'Ahora'],
                    datasets: [{
                        label: 'Ancho de Banda (Mbps)',
                        data: [45, 50, 40, 60, 55, 70, 65],
                        borderColor: '#00ffff',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#00ffff',
                        pointBorderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { duration: 500 },
                    plugins: {
                        legend: { labels: { color: '#a0aec0', font: { family: 'monospace' } } }
                    },
                    scales: {
                        y: {
                            beginAtZero: true, max: 100,
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#a0aec0', font: { family: 'monospace' } }
                        },
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#a0aec0', font: { family: 'monospace' } }
                        }
                    }
                }
            });

            const doughnut = new Chart(ctxDoughnut, {
                type: 'doughnut',
                data: {
                    labels: ['Servidores', 'Routers', 'Firewalls', 'Switches'],
                    datasets: [{
                        data: [40, 25, 15, 20],
                        backgroundColor: ['#00ffff', '#00ff00', '#ff0000', '#ffff00'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, cutout: '75%',
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#a0aec0', font: { family: 'monospace' } } }
                    }
                }
            });

            setInterval(() => {
                let data = chart.data.datasets[0].data;
                data.shift();
                data.push(Math.floor(Math.random() * 40) + 40);
                chart.update('none'); // Update sin animación pesada para que fluya
            }, 1500);
        });
